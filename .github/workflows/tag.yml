name: Publish to NPM
run-name: ${{ github.actor }} publish ${{ github.ref_name }} on ${{ github.repository }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use package.json)'
        required: false
        default: ''

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check sub-path ESM imports
        run: npm run test:esm

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="$(node -p "require('./package.json').version")"
            fi
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify NPM token is present
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN secret is empty or not accessible to this repo/run."
            exit 1
          fi
          echo "NPM_TOKEN is present."

      - name: Check if version already published
        id: check
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          if npm view "@softwarity/draw-adapter@$VERSION" version 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already on NPM — skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NPM
        if: steps.check.outputs.published == 'false'
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm publish --access public
